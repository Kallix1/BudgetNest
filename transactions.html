<div id="app-toast-container" style="position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; align-items: flex-end;"></div>

<script>
  function showToast(message, type) {
    const container = document.getElementById('app-toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    const palette = {
      error:   { bg: '#7F1D1D', border: '#EF4444' },
      success: { bg: '#14532D', border: '#22C55E' },
      info:    { bg: '#1E3A5F', border: '#3B82F6' },
    };
    const c = palette[type] || palette.info;
    toast.style.cssText = `background:${c.bg}; border:1px solid ${c.border}; color:#fff; padding:14px 18px; border-radius:10px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.35); max-width:340px; line-height:1.45;`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s ease';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 4200);
  }
</script>

<script>
  // ===== Тъмна тема =====
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ADMIN_EMAILS = ['choko2009vr@gmail.com']; // <-- замени с истинския си имейл

  let currentUser = null;
  let currentHouseholdId = null;
  let categories = [];
  let allTransactions = [];
  let filteredTransactions = [];

  // ===== Escaping на потребителски текст преди вмъкване в innerHTML =====
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  let currentPage = 1;
  const TX_PER_PAGE = 10;

  let filterType = 'all';
  let modalType = 'expense';
  let modalMethod = 'card';
  let editingTransactionId = null;
  let householdMemberCount = 1;
  let memberProfiles = {}; // user_id -> { full_name, email }

  const eur = (n) => (Number(n) || 0).toLocaleString('bg-BG', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

  // ===== Init flow =====
  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    document.getElementById('modal-tx-date').valueAsDate = new Date();

    if (ADMIN_EMAILS.map(e => e.toLowerCase()).includes((currentUser.email || '').toLowerCase())) {
      document.getElementById('admin-nav-link').style.display = 'flex';
    }

    const { data: memberships, error } = await supabaseClient
      .from('household_members')
      .select('household_id, households(name)')
      .eq('user_id', currentUser.id)
      .limit(1);

    if (error) { console.error(error); return; }

    if (!memberships || memberships.length === 0) {
      // Онбордингът за създаване на домакинство живее в dashboard.html
      window.location.href = 'dashboard.html';
      return;
    }

    currentHouseholdId = memberships[0].household_id;
    document.getElementById('household-name').textContent = memberships[0].households.name;
    document.getElementById('page-main').style.display = 'block';

    const { data: memberRows, error: memberError } = await supabaseClient
      .from('household_members')
      .select('user_id, profiles(full_name, email)')
      .eq('household_id', currentHouseholdId);

    if (memberError) { console.error(memberError); }
    memberProfiles = {};
    (memberRows || []).forEach(m => { memberProfiles[m.user_id] = m.profiles || {}; });
    householdMemberCount = (memberRows || []).length || 1;

    await loadCategories();
    await loadTransactions();
  })();

  // ===== Категории =====
  async function loadCategories() {
    const { data, error } = await supabaseClient
      .from('categories')
      .select('*')
      .eq('household_id', currentHouseholdId)
      .order('name');

    if (error) { console.error(error); return; }
    categories = data || [];

    const filterSelect = document.getElementById('filter-category');
    filterSelect.innerHTML = '<option value="all">Всички категории</option>';
    categories.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.icon + ' ' + c.name;
      filterSelect.appendChild(opt);
    });

    populateModalCategorySelect();
  }

  function populateModalCategorySelect() {
    const select = document.getElementById('modal-tx-category');
    select.innerHTML = '';
    categories.filter(c => c.type === modalType).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.icon + ' ' + c.name;
      select.appendChild(opt);
    });
  }

  // ===== Зареждане на всички транзакции (без ограничение по месец) =====
  async function loadTransactions() {
    const { data, error } = await supabaseClient
      .from('transactions')
      .select('*, categories(name, icon, type)')
      .eq('household_id', currentHouseholdId)
      .order('transaction_date', { ascending: false });

    if (error) { console.error(error); return; }
    allTransactions = data || [];
    currentPage = 1;
    applyFiltersAndRender();
  }

  // ===== Филтри =====
  function setFilterType(type) {
    filterType = type;
    document.querySelectorAll('.filters-row .type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
    applyFiltersAndRender();
  }

  function clearFilters() {
    filterType = 'all';
    document.querySelectorAll('.filters-row .type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === 'all'));
    document.getElementById('filter-category').value = 'all';
    document.getElementById('filter-date-from').value = '';
    document.getElementById('filter-date-to').value = '';
    document.getElementById('filter-search').value = '';
    applyFiltersAndRender();
  }

  function applyFiltersAndRender() {
    const categoryId = document.getElementById('filter-category').value;
    const dateFrom = document.getElementById('filter-date-from').value;
    const dateTo = document.getElementById('filter-date-to').value;
    const search = document.getElementById('filter-search').value.trim().toLowerCase();

    filteredTransactions = allTransactions.filter(t => {
      if (filterType !== 'all' && t.categories?.type !== filterType) return false;
      if (categoryId !== 'all' && t.category_id !== categoryId) return false;
      if (dateFrom && t.transaction_date < dateFrom) return false;
      if (dateTo && t.transaction_date > dateTo) return false;
      if (search && !((t.description || '').toLowerCase().includes(search))) return false;
      return true;
    });

    currentPage = 1;
    renderList();
  }

  // ===== Експорт на CSV =====
  function exportTransactionsCSV() {
    if (!filteredTransactions.length) {
      showToast('Няма транзакции за експорт при текущите филтри.', 'info');
      return;
    }
    // Ред за екраниране на стойности според RFC 4180 (запетаи, кавички, нови редове)
    const esc = (v) => {
      const s = String(v ?? '');
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
    };
    const header = ['Дата', 'Тип', 'Категория', 'Начин на плащане', 'Описание', 'Сума (EUR)'];
    const rows = filteredTransactions.map(t => [
      t.transaction_date,
      t.categories?.type === 'income' ? 'Приход' : 'Разход',
      t.categories?.name || '',
      t.payment_method === 'cash' ? 'В брой' : t.payment_method === 'card' ? 'Карта' : '',
      t.description || '',
      (Number(t.amount) || 0).toFixed(2),
    ]);
    // BOM в началото, за да се отварят правилно кирилските символи в Excel
    const csv = '\uFEFF' + [header, ...rows].map(r => r.map(esc).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `budgetnest-транзакции-${today}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(`Изтеглени ${filteredTransactions.length} транзакции.`, 'success');
  }
  function changePage(direction) {
    const totalPages = Math.max(1, Math.ceil(filteredTransactions.length / TX_PER_PAGE));
    currentPage += direction;
    if (currentPage < 1) currentPage = 1;
    if (currentPage > totalPages) currentPage = totalPages;
    renderList();
  }

  // ===== Рендиране на списъка =====
  function renderList() {
    const list = document.getElementById('tx-list');
    const nav = document.getElementById('tx-nav');
    const pageLabel = document.getElementById('tx-page-label');
    const countLabel = document.getElementById('tx-count-label');

    countLabel.textContent = filteredTransactions.length + ' резултата';

    if (!filteredTransactions.length) {
      if (!allTransactions.length) {
        list.innerHTML = '<div class="empty-state-rich"><span class="emoji">🌱</span><span class="title">Още нямате транзакции</span><span class="sub">Добавете първата си транзакция с бутона „Нова транзакция" горе.</span></div>';
      } else {
        list.innerHTML = '<div class="empty-state">Няма транзакции, отговарящи на филтрите.</div>';
      }
      nav.style.display = 'none';
      return;
    }

    const totalPages = Math.max(1, Math.ceil(filteredTransactions.length / TX_PER_PAGE));
    if (currentPage > totalPages) currentPage = totalPages;

    nav.style.display = totalPages > 1 ? 'flex' : 'none';
    pageLabel.textContent = 'Страница ' + currentPage + ' от ' + totalPages;

    const start = (currentPage - 1) * TX_PER_PAGE;
    const pageItems = filteredTransactions.slice(start, start + TX_PER_PAGE);

    list.innerHTML = pageItems.map(t => {
      const isIncome = t.categories?.type === 'income';
      const sign = isIncome ? '+' : '−';
      const actorName = householdMemberCount > 1
        ? ` · ${escapeHtml(t.user_id === currentUser.id ? 'Аз' : (memberProfiles[t.user_id]?.full_name || memberProfiles[t.user_id]?.email || 'Друг член'))}`
        : '';
      return `
        <div class="tx-row" onclick="openEditModal('${t.id}')" title="Кликни за редакция или изтриване">
          <div class="tx-icon">${escapeHtml(t.categories?.icon) || '💰'}</div>
          <div class="tx-info">
            <div class="tx-desc">${escapeHtml(t.description || t.categories?.name) || 'Транзакция'}</div>
            <div class="tx-meta">${t.payment_method === 'cash' ? '💵' : t.payment_method === 'card' ? '💳' : ''} ${escapeHtml(t.transaction_date)} · ${escapeHtml(t.categories?.name)}${actorName}</div>
          </div>
          <div class="tx-amount ${isIncome ? 'income' : 'expense'}">${sign} ${eur(t.amount)}</div>
        </div>`;
    }).join('');
  }

  // ===== Модал: добавяне / редакция =====
  function setModalMethod(method) {
    modalMethod = method;
    document.querySelectorAll('#modal-method-toggle .method-btn').forEach(b => b.classList.toggle('active', b.dataset.method === method));
  }

  function setModalType(type) {
    modalType = type;
    document.querySelectorAll('#tx-modal-overlay .type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
    const descInput = document.getElementById('modal-tx-description');
    if (descInput) {
      descInput.placeholder = type === 'income' ? 'напр. Заплата, Хонорар' : 'напр. Пазар от Kaufland';
    }
    populateModalCategorySelect();
  }

  function openAddModal() {
    editingTransactionId = null;
    document.getElementById('tx-modal-title').textContent = 'Нова транзакция';
    document.getElementById('modal-tx-submit').textContent = 'Добави';
    document.getElementById('modal-tx-delete').style.display = 'none';
    document.getElementById('tx-form').reset();
    document.getElementById('modal-tx-date').valueAsDate = new Date();
    setModalType('expense');
    setModalMethod('card');
    setStatus('modal-tx-status', '', '');
    document.getElementById('tx-modal-overlay').style.display = 'flex';
  }

  function openEditModal(id) {
    const tx = allTransactions.find(t => t.id === id);
    if (!tx) return;
    editingTransactionId = id;

    document.getElementById('tx-modal-title').textContent = 'Редактиране на транзакция';
    document.getElementById('modal-tx-submit').textContent = 'Запази';
    document.getElementById('modal-tx-delete').style.display = 'block';

    setModalType(tx.categories?.type || 'expense');
    setModalMethod(tx.payment_method || 'card');
    document.getElementById('modal-tx-amount').value = tx.amount;
    document.getElementById('modal-tx-description').value = tx.description || '';
    document.getElementById('modal-tx-date').value = tx.transaction_date;
    document.getElementById('modal-tx-category').value = tx.category_id;
    setStatus('modal-tx-status', '', '');

    document.getElementById('tx-modal-overlay').style.display = 'flex';
  }

  function closeTxModal() {
    document.getElementById('tx-modal-overlay').style.display = 'none';
    editingTransactionId = null;
  }

  async function handleSaveTransaction(event) {
    event.preventDefault();

    const amountRaw = document.getElementById('modal-tx-amount').value;
    const amount = parseFloat(amountRaw);
    const categoryId = document.getElementById('modal-tx-category').value;
    const txDate = document.getElementById('modal-tx-date').value;

    // Валидация преди изпращане
    if (!categoryId) {
      setStatus('modal-tx-status', 'Изберете категория.', 'error');
      return;
    }
    if (isNaN(amount) || amount <= 0) {
      setStatus('modal-tx-status', 'Въведете сума по-голяма от 0.', 'error');
      return;
    }
    if (!txDate) {
      setStatus('modal-tx-status', 'Изберете дата.', 'error');
      return;
    }

    const btn = document.getElementById('modal-tx-submit');
    btn.disabled = true;
    const isEditing = editingTransactionId !== null;
    setStatus('modal-tx-status', isEditing ? 'Запазване…' : 'Добавяне…', '');

    const payload = {
      household_id: currentHouseholdId,
      user_id: currentUser.id,
      category_id: categoryId,
      amount: Math.round(amount * 100) / 100,
      description: document.getElementById('modal-tx-description').value.trim(),
      transaction_date: txDate,
      payment_method: modalMethod,
    };

    let resultError = null;
    if (isEditing) {
      const { error } = await supabaseClient.from('transactions').update(payload).eq('id', editingTransactionId);
      resultError = error;
    } else {
      const { error } = await supabaseClient.from('transactions').insert([payload]);
      resultError = error;
    }

    btn.disabled = false;

    if (resultError) {
      setStatus('modal-tx-status', 'Грешка: ' + resultError.message, 'error');
      return;
    }

    closeTxModal();
    await loadTransactions();
  }

  // ===== Изтриване =====
  function openDeleteModal() {
    if (!editingTransactionId) return;
    document.getElementById('delete-modal-overlay').style.display = 'flex';
  }

  function closeDeleteModal() {
    document.getElementById('delete-modal-overlay').style.display = 'none';
  }

  async function confirmDeleteTransaction() {
    if (!editingTransactionId) return;
    closeDeleteModal();

    const { error } = await supabaseClient.from('transactions').delete().eq('id', editingTransactionId);

    if (error) {
      setStatus('modal-tx-status', 'Грешка при изтриване: ' + error.message, 'error');
      return;
    }

    closeTxModal();
    await loadTransactions();
  }

  // ===== Изход =====
  async function handleSignOut() {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }

  function setStatus(elId, message, type) {
    const el = document.getElementById(elId);
    el.textContent = message;
    el.className = 'status-msg' + (type ? ' ' + type : '');
  }
</script>

</body>
</html>
