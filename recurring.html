<head>

<style>
  body.dashboard-body {
    display: flex !important;
    align-items: stretch !important;
    min-height: 100vh !important;
    margin: 0;
    background: var(--bg-void);
  }
  .recur-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 10px 14px;
    padding: 14px 8px;
    border-bottom: 1px solid var(--border-soft);
  }
  .recur-row:last-child { border-bottom: none; }
  .recur-main { display: flex; align-items: center; gap: 14px; flex: 1 1 200px; min-width: 0; }
  .recur-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
  .recur-info { flex: 1; min-width: 0; }
  .recur-desc {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .recur-meta {
    font-size: 12.5px; color: var(--text-secondary); margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .recur-side { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; margin-left: auto; }
  .recur-amount { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 15px; white-space: nowrap; }
  .recur-amount.income { color: var(--color-income); }
  .recur-amount.expense { color: #DC2626; }
  .recur-actions { display: flex; gap: 8px; align-items: center; }
  .recur-pause-btn, .recur-delete-btn {
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    border-radius: 8px; padding: 7px 12px; cursor: pointer; white-space: nowrap;
    border: 1px solid var(--border-soft); background: var(--surface-alt); color: var(--text-secondary);
  }
  .recur-delete-btn { color: #E53E3E; border-color: rgba(229,62,62,0.3); }
  .recur-row.paused { opacity: 0.55; }
  .recur-badge {
    font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    background: rgba(221,133,0,0.15); color: #B7791F; margin-left: 8px;
  }
</style>
</head>
<body class="dashboard-body">

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<nav class="navbar">
  <div class="nav-left">
    <div class="nav-left-header">
      <div class="brand-mark">BudgetNest</div>
      <button class="nav-toggle" type="button" aria-label="Меню" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="dashboard.html" class="nav-link">Табло</a>
      <a href="transactions.html" class="nav-link">Транзакции</a>
      <a href="budgets.html" class="nav-link">Бюджети</a>
      <a href="wallets.html" class="nav-link">Портфейл</a>
      <a href="recurring.html" class="nav-link active">Периодични</a>
      <a href="reviews.html" class="nav-link">Отзиви</a>
      <a href="settings.html" class="nav-link">Настройки</a>
      <a href="admin.html" class="nav-link" id="admin-nav-link" style="display:none;">Админ</a>

  </div>
  <div class="nav-right">
    <span class="household-pill" id="household-name">…</span>
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Смяна на тема">🌙</button>
    <button class="btn-ghost" onclick="handleSignOut()">Изход</button>

</nav>

<main class="dashboard-main" id="page-main" style="display:none;">

  <div class="page-header">
    <h1>Периодични транзакции</h1>
    <span class="hint" style="color: var(--text-secondary); font-size: 13px;">автоматични приходи и разходи всеки месец</span>
  </div>

  <div class="card">
    <div class="card-title">Ново правило</div>
    <form id="recur-form" class="quick-add-grid" onsubmit="handleSaveRecurring(event)">
      <div class="type-toggle" id="recur-type-toggle">
        <button type="button" class="type-btn active" data-type="expense" onclick="setRecurType('expense')">Разход</button>
        <button type="button" class="type-btn" data-type="income" onclick="setRecurType('income')">Приход</button>
      </div>

      <div class="method-toggle" id="recur-method-toggle">
        <button type="button" class="method-btn active" data-method="card" onclick="setRecurMethod('card')">💳 Карта</button>
        <button type="button" class="method-btn" data-method="cash" onclick="setRecurMethod('cash')">💵 В брой</button>
      </div>

      <div class="type-toggle" id="recur-freq-toggle">
        <button type="button" class="type-btn active" data-freq="monthly" onclick="setRecurFrequency('monthly')">Веднъж месечно</button>
        <button type="button" class="type-btn" data-freq="weekly" onclick="setRecurFrequency('weekly')">Всяка седмица</button>
      </div>

      <div class="field full">
        <label>Сума (€)</label>
        <input type="number" id="recur-amount" step="0.01" min="0.01" placeholder="0.00" required>
      </div>

      <div class="field full">
        <label>Категория</label>
        <select id="recur-category" required></select>
      </div>

      <div class="field full">
        <label>Описание</label>
        <input type="text" id="recur-description" placeholder="напр. Заплата, Нетфликс абонамент, седмичен хонорар">
      </div>

      <div class="field full" id="recur-day-month-field">
        <label>Ден от месеца</label>
        <input type="number" id="recur-day" min="1" max="31" placeholder="напр. 1">
        <span class="hint" style="font-size:11.5px;">Ако месецът е по-кратък, ще се приложи на последния му ден.</span>
      </div>

      <div class="field full" id="recur-day-week-field" style="display:none;">
        <label>Ден от седмицата</label>
        <select id="recur-weekday">
          <option value="1">Понеделник</option>
          <option value="2">Вторник</option>
          <option value="3">Сряда</option>
          <option value="4">Четвъртък</option>
          <option value="5">Петък</option>
          <option value="6">Събота</option>
          <option value="0">Неделя</option>
        </select>
      </div>

      <div class="field full">
        <div class="status-msg" id="recur-status"></div>
        <button type="submit" class="submit" style="width: 100%; margin-top: 6px;">Добави правило</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="card-title">
      Активни правила
      <span class="hint" id="recur-count-label"></span>
    </div>
    <div id="recur-list">
      <div class="skeleton-row"><span class="skeleton skeleton-circle"></span><span class="skeleton-lines"><span class="skeleton skeleton-line medium"></span><span class="skeleton skeleton-line short"></span></span></div>
      <div class="skeleton-row"><span class="skeleton skeleton-circle"></span><span class="skeleton-lines"><span class="skeleton skeleton-line medium"></span><span class="skeleton skeleton-line short"></span></span></div>
    </div>
  </div>

</main>

<div id="app-toast-container" style="position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; align-items: flex-end;"></div>

<script>
  function showToast(message, type) {
    const container = document.getElementById('app-toast-container');
    const toast = document.createElement('div');
    const palette = {
      error:   { bg: '#7F1D1D', border: '#EF4444' },
      success: { bg: '#14532D', border: '#22C55E' },
      info:    { bg: '#1E3A5F', border: '#3B82F6' },
    };
    const c = palette[type] || palette.info;
    toast.style.cssText = `background:${c.bg}; border:1px solid ${c.border}; color:#fff; padding:14px 18px; border-radius:10px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.35); max-width:340px; line-height:1.45;`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s ease';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 4200);
  }
</script>

<script>
  // ===== Тъмна тема =====
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ADMIN_EMAILS = ['choko2009vr@gmail.com']; // <-- замени с истинския си имейл

  let currentUser = null;
  let currentHouseholdId = null;
  let categories = [];
  let recurringRows = [];
  let recurType = 'expense';
  let recurMethod = 'card';
  let recurFrequency = 'monthly';

  const eur = (n) => (Number(n) || 0).toLocaleString('bg-BG', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setStatus(id, message, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = message;
    el.style.color = type === 'error' ? '#E53E3E' : (type === 'success' ? 'var(--color-income)' : 'var(--text-secondary)');
  }

  function setRecurType(type) {
    recurType = type;
    document.querySelectorAll('#recur-type-toggle .type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
    populateRecurCategorySelect();
  }

  function setRecurMethod(method) {
    recurMethod = method;
    document.querySelectorAll('#recur-method-toggle .method-btn').forEach(b => b.classList.toggle('active', b.dataset.method === method));
  }

  function setRecurFrequency(freq) {
    recurFrequency = freq;
    document.querySelectorAll('#recur-freq-toggle .type-btn').forEach(b => b.classList.toggle('active', b.dataset.freq === freq));
    document.getElementById('recur-day-month-field').style.display = freq === 'monthly' ? 'block' : 'none';
    document.getElementById('recur-day-week-field').style.display = freq === 'weekly' ? 'block' : 'none';
  }

  function populateRecurCategorySelect() {
    const select = document.getElementById('recur-category');
    select.innerHTML = '';
    categories.filter(c => c.type === recurType).forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.icon + ' ' + c.name;
      select.appendChild(opt);
    });
  }

  // ===== Init flow =====
  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;

    if (ADMIN_EMAILS.map(e => e.toLowerCase()).includes((currentUser.email || '').toLowerCase())) {
      document.getElementById('admin-nav-link').style.display = 'flex';
    }

    const { data: memberships, error } = await supabaseClient
      .from('household_members')
      .select('household_id, households(name)')
      .eq('user_id', currentUser.id)
      .limit(1);

    if (error) { console.error(error); return; }

    if (!memberships || memberships.length === 0) {
      window.location.href = 'dashboard.html';
      return;
    }

    currentHouseholdId = memberships[0].household_id;
    document.getElementById('household-name').textContent = memberships[0].households.name;
    document.getElementById('page-main').style.display = 'block';

    await loadCategories();

    // Досъбира просрочени правила веднага (без да чакаме нощния cron)
    try {
      await supabaseClient.rpc('run_recurring_now', { p_household_id: currentHouseholdId });
    } catch (e) {
      console.error('run_recurring_now failed', e);
    }

    await loadRecurring();
  })();

  async function loadCategories() {
    const { data, error } = await supabaseClient
      .from('categories')
      .select('*')
      .eq('household_id', currentHouseholdId)
      .order('name');

    if (error) { console.error(error); return; }
    categories = data || [];
    populateRecurCategorySelect();
  }

  async function loadRecurring() {
    const { data, error } = await supabaseClient
      .from('recurring_transactions')
      .select('*')
      .eq('household_id', currentHouseholdId)
      .order('created_at');

    if (error) {
      console.error(error);
      document.getElementById('recur-list').innerHTML =
        '<div class="empty-state">Грешка при зареждане: ' + escapeHtml(error.message) + '</div>';
      document.getElementById('recur-count-label').textContent = '';
      return;
    }

    recurringRows = data || [];
    renderRecurring();
  }

  function categoryById(id) {
    return categories.find(c => c.id === id) || null;
  }

  const WEEKDAY_NAMES = ['неделя', 'понеделник', 'вторник', 'сряда', 'четвъртък', 'петък', 'събота'];

  function renderRecurring() {
    const list = document.getElementById('recur-list');
    const countLabel = document.getElementById('recur-count-label');
    countLabel.textContent = recurringRows.length ? recurringRows.length + ' правила' : '';

    if (!recurringRows.length) {
      list.innerHTML = '<div class="empty-state">Още няма зададени периодични транзакции.</div>';
      return;
    }

    list.innerHTML = recurringRows.map(r => {
      const cat = categoryById(r.category_id);
      const isIncome = cat?.type === 'income';
      const sign = isIncome ? '+' : '−';
      const methodIcon = r.payment_method === 'cash' ? '💵' : (r.payment_method === 'card' ? '💳 ' : '');
      const nextDate = new Date(r.next_run_date).toLocaleDateString('bg-BG');
      const schedule = r.frequency === 'weekly'
        ? `всяка ${WEEKDAY_NAMES[r.day_of_week]}`
        : `всеки месец на ${r.day_of_month}-во`;
      return `
        <div class="recur-row ${r.is_active ? '' : 'paused'}">
          <div class="recur-main">
            <div class="recur-icon">${escapeHtml(cat?.icon) || '💰'}</div>
            <div class="recur-info">
              <div class="recur-desc">${escapeHtml(r.description || cat?.name) || 'Транзакция'}${r.is_active ? '' : '<span class="recur-badge">на пауза</span>'}</div>
              <div class="recur-meta">${methodIcon} ${schedule} · следваща: ${nextDate}</div>
            </div>
          </div>
          <div class="recur-side">
            <div class="recur-amount ${isIncome ? 'income' : 'expense'}">${sign} ${eur(r.amount)}</div>
            <div class="recur-actions">
              <button type="button" class="recur-pause-btn" onclick="toggleRecurActive('${r.id}', ${!r.is_active})">${r.is_active ? 'Пауза' : 'Възобнови'}</button>
              <button type="button" class="recur-delete-btn" onclick="deleteRecurring('${r.id}')">Изтрий</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ===== Добавяне на ново правило =====
  async function handleSaveRecurring(event) {
    event.preventDefault();

    const amount = parseFloat(document.getElementById('recur-amount').value);
    const categoryId = document.getElementById('recur-category').value;
    const description = document.getElementById('recur-description').value.trim();

    if (!categoryId) { setStatus('recur-status', 'Изберете категория.', 'error'); return; }
    if (isNaN(amount) || amount <= 0) { setStatus('recur-status', 'Въведете сума по-голяма от 0.', 'error'); return; }

    const payload = {
      household_id: currentHouseholdId,
      user_id: currentUser.id,
      category_id: categoryId,
      amount: Math.round(amount * 100) / 100,
      description,
      payment_method: recurMethod,
      frequency: recurFrequency,
      is_active: true,
    };

    const today = new Date();

    if (recurFrequency === 'monthly') {
      const day = parseInt(document.getElementById('recur-day').value, 10);
      if (isNaN(day) || day < 1 || day > 31) { setStatus('recur-status', 'Денят трябва да е между 1 и 31.', 'error'); return; }
      payload.day_of_month = day;
      payload.next_run_date = computeNextMonthlyRunDate(today, day);
    } else {
      const weekday = parseInt(document.getElementById('recur-weekday').value, 10);
      payload.day_of_week = weekday;
      payload.next_run_date = computeNextWeeklyRunDate(today, weekday);
    }

    setStatus('recur-status', 'Добавяне…', '');

    const { error } = await supabaseClient.from('recurring_transactions').insert([payload]);

    if (error) {
      setStatus('recur-status', 'Грешка: ' + error.message, 'error');
      return;
    }

    setStatus('recur-status', '', '');
    showToast('Правилото е добавено ✓', 'success');
    document.getElementById('recur-form').reset();
    setRecurType('expense');
    setRecurMethod('card');
    setRecurFrequency('monthly');

    await loadRecurring();
  }

  // Първата следваща дата за месечно правило: ако денят този месец вече е минал, взимаме следващия месец
  function computeNextMonthlyRunDate(today, day) {
    const y = today.getFullYear();
    const m = today.getMonth(); // 0-based
    const daysInThisMonth = new Date(y, m + 1, 0).getDate();
    const clampedThisMonth = Math.min(day, daysInThisMonth);
    const candidateThisMonth = new Date(y, m, clampedThisMonth);

    if (candidateThisMonth >= new Date(y, m, today.getDate())) {
      return candidateThisMonth.toISOString().slice(0, 10);
    }

    const daysInNextMonth = new Date(y, m + 2, 0).getDate();
    const clampedNextMonth = Math.min(day, daysInNextMonth);
    return new Date(y, m + 1, clampedNextMonth).toISOString().slice(0, 10);
  }

  // Първата следваща дата за седмично правило: следващият ден от седмицата (0=нед..6=съб) на/след днес
  function computeNextWeeklyRunDate(today, weekday) {
    const result = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const diff = (weekday - result.getDay() + 7) % 7;
    result.setDate(result.getDate() + diff);
    return result.toISOString().slice(0, 10);
  }

  // ===== Пауза / възобновяване =====
  async function toggleRecurActive(id, makeActive) {
    const { error } = await supabaseClient
      .from('recurring_transactions')
      .update({ is_active: makeActive })
      .eq('id', id);

    if (error) { showToast('Грешка: ' + error.message, 'error'); return; }
    await loadRecurring();
  }

  // ===== Изтриване =====
  async function deleteRecurring(id) {
    const { error } = await supabaseClient
      .from('recurring_transactions')
      .delete()
      .eq('id', id);

    if (error) { showToast('Грешка: ' + error.message, 'error'); return; }
    showToast('Правилото е изтрито ✓', 'success');
    await loadRecurring();
  }

  // ===== Изход =====
  async function handleSignOut() {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
