<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Имейлът е потвърден — BudgetNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=16">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Смяна на тема" style="position: fixed; top: 24px; right: 24px; z-index: 5;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>

<div class="page" style="grid-template-columns: 1fr; max-width: 460px;">
  <div class="form-side" style="padding: 56px 48px; text-align: center; align-items: center;">
    <div class="brand-mark" style="margin-bottom: 28px; justify-content: center;">BudgetNest</div>

    <div id="confirm-loading">
      <p style="color: var(--text-secondary); font-size: 14px;">Потвърждаване…</p>
    </div>

    <div id="confirm-success" style="display:none;">
      <div style="margin-bottom: 14px; display:flex; justify-content:center;"><span style="display:inline-flex; width:44px; height:44px; color: var(--heading-accent);"><svg viewBox="0 0 24 24" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-8"></path><path d="M12 13c0-3-2.2-5.2-5.2-5.2H4C4 10.8 6.2 13 9.2 13H12Z"></path><path d="M12 11.5c0-3.2 2.2-5.5 5.4-5.5H20c0 3.2-2.2 5.5-5.4 5.5H12Z"></path></svg></span></div>
      <h2 style="font-family:'Fraunces',serif; font-size: 24px; color: var(--heading-accent); margin-bottom: 12px;">Имейлът е потвърден!</h2>
      <p style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 26px;">
        Акаунтът ви в BudgetNest вече е активен. Можете да влезете и да започнете да управлявате бюджета на домакинството си.
      </p>
      <a href="dashboard.html" class="submit" style="display:block; text-align:center; text-decoration:none;">Към таблото</a>
    </div>

    <div id="confirm-fallback" style="display:none;">
      <h2 style="font-family:'Fraunces',serif; font-size: 22px; color: var(--heading-accent); margin-bottom: 12px;">Готово</h2>
      <p style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 26px;">
        Ако имейлът ви вече е потвърден, влезте с имейл и парола отдолу.
      </p>
      <a href="login.html" class="submit" style="display:block; text-align:center; text-decoration:none;">Обратно към входа</a>
    </div>
  </div>
</div>

<script>
  // ===== Тъмна тема =====
  const SUN_ICON_PATH = '<circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  const MOON_ICON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon">' + (theme === 'dark' ? SUN_ICON_PATH : MOON_ICON_PATH) + '</svg>';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function showState(state) {
    document.getElementById('confirm-loading').style.display = state === 'loading' ? 'block' : 'none';
    document.getElementById('confirm-success').style.display = state === 'success' ? 'block' : 'none';
    document.getElementById('confirm-fallback').style.display = state === 'fallback' ? 'block' : 'none';
  }

  // Supabase-js автоматично парсва потвърждаващия токън от URL хеша при зареждане
  // и издава сесия, ако потвърждението е минало успешно.
  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    setTimeout(() => {
      showState(session ? 'success' : 'fallback');
    }, 900);
  })();
</script>

<script src="chatbot.js?v=1" defer></script>
</body>
</html>
