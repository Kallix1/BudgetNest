<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="login.page_title">Влизане — BudgetNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=16">
<script src="i18n.js?v=9" defer></script>
<script src="analytics.js?v=1" defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<button class="theme-toggle" id="lang-toggle-btn" onclick="toggleLang()" data-i18n-title="nav.lang_toggle_title" title="Смяна на език" style="position: fixed; top: 24px; right: 74px; z-index: 5;">EN</button>
<button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" data-i18n-title="nav.theme_toggle_title" title="Смяна на тема" style="position: fixed; top: 24px; right: 24px; z-index: 5;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>

<div class="page">
  <div class="brand-side">
    <div>
      <div class="brand-mark" data-i18n="login.brand_mark">Бюджет · Домакинство</div>
      <div class="brand-headline"><span data-i18n="login.brand_headline_line1">Всяко евро,</span><br><span data-i18n="login.brand_headline_line2">под контрол.</span></div>
      <p class="brand-sub" data-i18n="login.brand_sub">Споделен бюджет за домакинството ви — без абонамент, без ограничения за брой членове.</p>
    </div>
    <div class="brand-stat" id="brand-stat-text"></div>
  </div>

  <div class="form-side">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')" data-i18n="login.tab_login">Вход</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')" data-i18n="login.tab_signup">Регистрация</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="form-login" class="active" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="login-email" data-i18n="login.email_label">Имейл</label>
        <input type="email" id="login-email" placeholder="ime@poshta.bg" required>
      </div>
      <div class="field">
        <label for="login-password" data-i18n="login.password_label">Парола</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <div class="row-inline">
        <a href="#" onclick="handleForgotPassword(event)" data-i18n="login.forgot_password">Забравена парола?</a>
      </div>
      <div class="status-msg" id="login-status"></div>
      <button type="submit" class="submit" id="login-submit" data-i18n="login.login_submit">Влез в акаунта</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="form-signup" onsubmit="handleSignup(event)">
      <div class="field">
        <label for="signup-name" data-i18n="login.name_label">Име</label>
        <input type="text" id="signup-name" data-i18n-placeholder="login.name_placeholder" placeholder="Име и фамилия" required>
      </div>
      <div class="field">
        <label for="signup-email" data-i18n="login.email_label">Имейл</label>
        <input type="email" id="signup-email" placeholder="ime@poshta.bg" required>
      </div>
      <div class="field">
        <label for="signup-password" data-i18n="login.password_label">Парола</label>
        <input type="password" id="signup-password" data-i18n-placeholder="login.password_placeholder_signup" placeholder="Поне 6 символа" minlength="6" required oninput="updatePasswordStrength(this.value)">
        <div id="pw-strength-wrap" style="display:none; margin-top:8px;">
          <div style="display:flex; gap:5px;">
            <div class="pw-bar" style="flex:1; height:5px; border-radius:3px; background:var(--border-soft); transition:background 0.2s;"></div>
            <div class="pw-bar" style="flex:1; height:5px; border-radius:3px; background:var(--border-soft); transition:background 0.2s;"></div>
            <div class="pw-bar" style="flex:1; height:5px; border-radius:3px; background:var(--border-soft); transition:background 0.2s;"></div>
            <div class="pw-bar" style="flex:1; height:5px; border-radius:3px; background:var(--border-soft); transition:background 0.2s;"></div>
          </div>
          <div id="pw-strength-label" style="font-size:12px; margin-top:5px; color:var(--text-dim);"></div>
        </div>
      </div>
      <div class="status-msg" id="signup-status"></div>
      <button type="submit" class="submit" id="signup-submit" data-i18n="login.signup_submit">Създай акаунт</button>
    </form>

    <p class="fine-print" data-i18n="login.fine_print">Регистрирайки се, приемате данните ви да се пазят само за да управлявате бюджета на домакинството си. Всички суми се показват в евро (EUR).</p>
  </div>
</div>

<script>
  // ===== Тъмна тема =====
  const SUN_ICON_PATH = '<circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  const MOON_ICON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon">' + (theme === 'dark' ? SUN_ICON_PATH : MOON_ICON_PATH) + '</svg>';
    localStorage.setItem('budgetnest-theme', theme);
  }

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  const tr = (key, vars) => window.BudgetNestI18n ? window.BudgetNestI18n.t(key, vars) : key;

  function renderBrandStat() {
    const el = document.getElementById('brand-stat-text');
    if (!el) return;
    el.innerHTML = tr('login.brand_stat', { amount: '<b>~434.60 €</b>' });
  }
  renderBrandStat();
  window.onLanguageChange = renderBrandStat;

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ===== Табове =====
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-signup').classList.toggle('active', tab === 'signup');
  }

  function setStatus(elId, message, type) {
    const el = document.getElementById(elId);
    el.textContent = message;
    el.className = 'status-msg' + (type ? ' ' + type : '');
  }

  // ===== Вход =====
  async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-submit');

    btn.disabled = true;
    setStatus('login-status', tr('login.status_logging_in'), '');

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    btn.disabled = false;

    if (error) {
      setStatus('login-status', tr('login.err_wrong_credentials'), 'error');
      return;
    }

    setStatus('login-status', tr('login.status_login_success'), 'success');
    window.location.href = 'dashboard.html';
  }

  // ===== Сила на паролата =====
  function updatePasswordStrength(pw) {
    const wrap = document.getElementById('pw-strength-wrap');
    const bars = document.querySelectorAll('.pw-bar');
    const label = document.getElementById('pw-strength-label');
    if (!pw) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';

    let score = 0;
    if (pw.length >= 6) score++;
    if (pw.length >= 10) score++;
    if (/[A-ZА-Я]/.test(pw) && /[a-zа-я]/.test(pw)) score++;
    if (/\d/.test(pw) && /[^A-Za-zА-Яа-я0-9]/.test(pw)) score++;
    score = Math.min(score, 4);

    const levels = [
      { c: '#E53E3E', t: tr('login.pw_weak') },
      { c: '#E53E3E', t: tr('login.pw_weak') },
      { c: '#DD8500', t: tr('login.pw_medium') },
      { c: '#3E9C6A', t: tr('login.pw_good') },
      { c: '#2F855A', t: tr('login.pw_strong') },
    ];
    const lvl = levels[score];
    bars.forEach((b, i) => { b.style.background = i < score ? lvl.c : 'var(--border-soft)'; });
    label.textContent = pw.length < 6 ? tr('login.pw_too_short') : (tr('login.pw_strength_prefix') + lvl.t);
    label.style.color = pw.length < 6 ? '#E53E3E' : lvl.c;
  }

  // ===== Регистрация =====
  async function handleSignup(event) {
    event.preventDefault();
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn = document.getElementById('signup-submit');

    btn.disabled = true;
    setStatus('signup-status', tr('login.status_creating_account'), '');

    const redirectUrl = new URL('email-confirmed.html', window.location.href).href;
    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name },
        emailRedirectTo: redirectUrl
      }
    });

    btn.disabled = false;

    if (error) {
      setStatus('signup-status', tr('common.error_prefix') + error.message, 'error');
      return;
    }

    setStatus('signup-status', tr('login.status_signup_success'), 'success');
  }

  // ===== Забравена парола =====
  async function handleForgotPassword(event) {
    event.preventDefault();
    const email = document.getElementById('login-email').value.trim();

    if (!email) {
      setStatus('login-status', tr('login.err_email_required_reset'), 'error');
      return;
    }

    const redirectUrl = new URL('reset-password.html', window.location.href).href;
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });

    if (error) {
      setStatus('login-status', tr('common.error_prefix') + error.message, 'error');
      return;
    }

    setStatus('login-status', tr('login.status_reset_sent'), 'success');
  }

  // ===== Защитна мрежа: ако Supabase поради грешна конфигурация върне
  // recovery токъна тук вместо на reset-password.html, прехвърляме го ръчно =====
  if (window.location.hash.includes('type=recovery')) {
    window.location.href = 'reset-password.html' + window.location.hash;
  }

  // ===== Ако вече е логнат, пренасочи директно =====
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      window.location.href = 'dashboard.html';
    }
  })();
</script>

<script src="chatbot.js?v=1" defer></script>
</body>
</html>
