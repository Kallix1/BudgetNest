<script>
  function showToast(message, type) {
    const container = document.getElementById('app-toast-container');
    const toast = document.createElement('div');
    const palette = {
      error:   { bg: '#7F1D1D', border: '#EF4444' },
      success: { bg: '#14532D', border: '#22C55E' },
      info:    { bg: '#1E3A5F', border: '#3B82F6' },
    };
    const c = palette[type] || palette.info;
    toast.style.cssText = `background:${c.bg}; border:1px solid ${c.border}; color:#fff; padding:14px 18px; border-radius:10px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.35); max-width:340px; line-height:1.45;`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s ease';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 4200);
  }

  // ===== Модал за потвърждение (замества confirm()) =====
  function showConfirm(message, title) {
    return new Promise((resolve) => {
      document.getElementById('app-confirm-title').textContent = title || 'Потвърждение';
      document.getElementById('app-confirm-message').textContent = message;
      const overlay = document.getElementById('app-confirm-overlay');
      overlay.style.display = 'flex';

      const okBtn = document.getElementById('app-confirm-ok-btn');
      const cancelBtn = document.getElementById('app-confirm-cancel-btn');

      function cleanup(result) {
        overlay.style.display = 'none';
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        resolve(result);
      }
      function onOk() { cleanup(true); }
      function onCancel() { cleanup(false); }

      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
    });
  }
</script>

<script>
  // ===== Тъмна тема =====
  const SUN_ICON_PATH = '<circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  const MOON_ICON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon">' + (theme === 'dark' ? SUN_ICON_PATH : MOON_ICON_PATH) + '</svg>';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Показва връзката "Споделено" в менюто само ако домакинството има повече от 1 член
  async function updateSettleNavVisibility(userId) {
    const link = document.getElementById('settle-nav-link');
    if (!link) return;
    const { data: myMembership } = await supabaseClient
      .from('household_members')
      .select('household_id')
      .eq('user_id', userId)
      .limit(1)
      .maybeSingle();
    if (!myMembership) { link.style.display = 'none'; return; }
    const { count } = await supabaseClient
      .from('household_members')
      .select('*', { count: 'exact', head: true })
      .eq('household_id', myMembership.household_id);
    link.style.display = (count && count > 1) ? 'flex' : 'none';
  }
  const ADMIN_EMAILS = ['choko2009vr@gmail.com']; // <-- замени с истинския си имейл

  let currentUser = null;
  let currentHouseholdId = null;
  let goals = [];
  let contributionsByGoal = {}; // goal_id -> [{user_id, amount, note, created_at}]
  let memberProfiles = {};      // user_id -> { full_name, email }
  let editingGoalId = null;

  const t = (key, vars) => window.BudgetNestI18n ? window.BudgetNestI18n.t(key, vars) : key;
  const getLang = () => window.BudgetNestI18n ? window.BudgetNestI18n.getLang() : 'bg';
  const eur = (n) => (Number(n) || 0).toLocaleString(getLang() === 'bg' ? 'bg-BG' : 'en-IE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function setStatus(id, message, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = message;
    el.style.color = type === 'error' ? '#E53E3E' : (type === 'success' ? 'var(--color-income)' : 'var(--text-secondary)');
  }

  // ===== Init flow =====
  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    updateSettleNavVisibility(currentUser.id);

    if (ADMIN_EMAILS.map(e => e.toLowerCase()).includes((currentUser.email || '').toLowerCase())) {
      document.getElementById('admin-nav-link').style.display = 'flex';
    }

    const { data: memberships, error } = await supabaseClient
      .from('household_members')
      .select('household_id, households(name)')
      .eq('user_id', currentUser.id)
      .limit(1);

    if (error) { console.error(error); return; }

    if (!memberships || memberships.length === 0) {
      window.location.href = 'dashboard.html';
      return;
    }

    currentHouseholdId = memberships[0].household_id;
    document.getElementById('household-name').textContent = memberships[0].households.name;
    document.getElementById('page-main').style.display = 'block';

    const { data: memberRows } = await supabaseClient
      .from('household_members')
      .select('user_id, profiles(full_name, email)')
      .eq('household_id', currentHouseholdId);
    memberProfiles = {};
    (memberRows || []).forEach(m => { memberProfiles[m.user_id] = m.profiles || {}; });

    await loadGoals();
  })();

  function memberLabel(userId) {
    if (userId === currentUser.id) return t('goals.you_label');
    return memberProfiles[userId]?.full_name || memberProfiles[userId]?.email || t('goals.other_member_label');
  }

  // ===== Зареждане на целите + последните вноски =====
  async function loadGoals() {
    const { data: goalRows, error } = await supabaseClient
      .from('savings_goals')
      .select('*')
      .eq('household_id', currentHouseholdId)
      .order('created_at', { ascending: false });

    if (error) {
      console.error(error);
      document.getElementById('goals-list').innerHTML =
        '<div class="empty-state" style="color:#DC2626;">Грешка при зареждане: ' + escapeHtml(error.message) + '</div>';
      return;
    }

    goals = goalRows || [];

    const { data: contribRows, error: contribError } = await supabaseClient
      .from('savings_goal_contributions')
      .select('goal_id, user_id, amount, note, created_at')
      .eq('household_id', currentHouseholdId)
      .order('created_at', { ascending: false });

    if (contribError) { console.error(contribError); }

    contributionsByGoal = {};
    (contribRows || []).forEach(c => {
      if (!contributionsByGoal[c.goal_id]) contributionsByGoal[c.goal_id] = [];
      contributionsByGoal[c.goal_id].push(c);
    });

    renderGoals();
  }

  // ===== Рендиране =====
  function renderGoals() {
    const container = document.getElementById('goals-list');
    document.getElementById('goals-count-label').textContent = goals.length
      ? goals.length + ' ' + (goals.length === 1 ? t('goals.count_suffix_one') : t('goals.count_suffix_other'))
      : '';

    if (!goals.length) {
      container.innerHTML = '<div class="empty-state">' + escapeHtml(t('goals.empty_state')) + '</div>';
      return;
    }

    const dateLocale = getLang() === 'bg' ? 'bg-BG' : 'en-GB';

    container.innerHTML = '<div class="goals-grid">' + goals.map(g => {
      const target = Number(g.target_amount);
      const current = Number(g.current_amount);
      const pct = target > 0 ? Math.min((current / target) * 100, 100) : 0;
      const isOver = current >= target;
      const remaining = Math.max(target - current, 0);

      let dateHint = '';
      if (g.target_date) {
        const days = Math.ceil((new Date(g.target_date) - new Date(new Date().toDateString())) / 86400000);
        const dateLabel = new Date(g.target_date).toLocaleDateString(dateLocale);
        const daysLabel = days === 1 ? t('common.day_singular') : t('common.day_plural');
        dateHint = `<div class="goal-date-hint">${t('goals.date_until_prefix')} ${dateLabel}${days >= 0 ? ` · ${t('goals.days_left_prefix')} ${days} ${daysLabel}` : ` · ${t('goals.date_passed')}`}</div>`;
      }

      const recentContribs = (contributionsByGoal[g.id] || []).slice(0, 4);
      const historyHtml = recentContribs.length
        ? recentContribs.map(c => `
            <div class="goal-history-row">
              <span>${escapeHtml(memberLabel(c.user_id))} ${c.amount >= 0 ? t('goals.added_label') : t('goals.withdrew_label')}</span>
              <span style="font-family:'IBM Plex Mono',monospace; color:${c.amount >= 0 ? 'var(--color-income)' : '#E53E3E'};">${c.amount >= 0 ? '+' : ''}${eur(c.amount)}</span>
            </div>`).join('')
        : `<div class="goal-history-empty">${escapeHtml(t('goals.no_contributions_yet'))}</div>`;

      return `
        <div class="goal-card ${isOver ? 'completed' : ''}" data-goal="${g.id}">
          <div class="goal-head">
            <div class="goal-title" onclick="openGoalEditModal('${g.id}')" title="${escapeHtml(t('common.save'))}">
              <span class="goal-icon">${escapeHtml(g.icon || '🎯')}</span>
              <span class="goal-name">${escapeHtml(g.name)}</span>
            </div>
            <div style="display:flex; align-items:center; gap:6px;">
              ${isOver ? `<span class="goal-complete-badge">${escapeHtml(t('goals.completed_badge'))}</span>` : ''}
              <button type="button" class="goal-delete-btn" onclick="deleteGoal('${g.id}')" title="${escapeHtml(t('common.delete'))}">✕</button>
            </div>
          </div>

          <div class="compare-track"><div class="compare-fill" style="width:${pct}%"></div></div>

          <div class="goal-stats">
            <span>${t('goals.saved_label')}: <b>${eur(current)}</b></span>
            <span>${t('goals.target_label')}: <b>${eur(target)}</b></span>
          </div>
          ${!isOver ? `<div class="goal-stats"><span>${t('goals.remaining_label')}: <b>${eur(remaining)}</b></span><span>${Math.round(pct)}%</span></div>` : ''}
          ${dateHint}

          <div class="goal-contribute-row">
            <input type="number" step="0.01" min="0.01" placeholder="0.00" id="goal-amount-${g.id}">
            <button type="button" class="add" onclick="addContribution('${g.id}', 1)">${t('goals.add_funds_button')}</button>
            <button type="button" class="withdraw" onclick="addContribution('${g.id}', -1)">${t('goals.withdraw_button')}</button>
          </div>

          <div class="goal-history">${historyHtml}</div>
        </div>`;
    }).join('') + '</div>';
  }

  // ===== Добавяне на нова цел =====
  async function handleAddGoal(event) {
    event.preventDefault();

    const icon = document.getElementById('goal-icon').value.trim() || '🎯';
    const name = document.getElementById('goal-name').value.trim();
    const target = parseFloat(document.getElementById('goal-target').value);
    const targetDate = document.getElementById('goal-date').value || null;

    if (!name) { setStatus('goal-form-status', t('goals.error_name_required'), 'error'); return; }
    if (isNaN(target) || target <= 0) { setStatus('goal-form-status', t('goals.error_target_invalid'), 'error'); return; }

    setStatus('goal-form-status', t('common.loading'), '');

    const { error } = await supabaseClient
      .from('savings_goals')
      .insert([{
        household_id: currentHouseholdId,
        created_by: currentUser.id,
        icon, name,
        target_amount: Math.round(target * 100) / 100,
        target_date: targetDate,
      }]);

    if (error) {
      setStatus('goal-form-status', t('common.error_prefix') + error.message, 'error');
      return;
    }

    document.getElementById('goal-form').reset();
    setStatus('goal-form-status', '', '');
    showToast(t('goals.toast_added'), 'success');
    await loadGoals();
  }

  // ===== Вноска / теглене =====
  async function addContribution(goalId, sign) {
    const input = document.getElementById('goal-amount-' + goalId);
    const raw = parseFloat(input.value);

    if (isNaN(raw) || raw <= 0) {
      showToast(t('goals.error_amount_invalid'), 'error');
      return;
    }

    const amount = sign * (Math.round(raw * 100) / 100);

    const { error } = await supabaseClient
      .from('savings_goal_contributions')
      .insert([{
        goal_id: goalId,
        household_id: currentHouseholdId,
        user_id: currentUser.id,
        amount,
      }]);

    if (error) {
      showToast(t('common.error_prefix') + error.message, 'error');
      return;
    }

    input.value = '';
    showToast(sign > 0 ? t('goals.toast_added_funds') : t('goals.toast_withdrew_funds'), 'success');
    await loadGoals();
  }

  // ===== Редакция =====
  function openGoalEditModal(goalId) {
    const g = goals.find(x => x.id === goalId);
    if (!g) return;
    editingGoalId = goalId;
    document.getElementById('goal-edit-icon').value = g.icon || '🎯';
    document.getElementById('goal-edit-name').value = g.name;
    document.getElementById('goal-edit-target').value = g.target_amount;
    document.getElementById('goal-edit-date').value = g.target_date || '';
    setStatus('goal-edit-status', '', '');
    document.getElementById('goal-edit-overlay').style.display = 'flex';
  }

  function closeGoalEditModal() {
    document.getElementById('goal-edit-overlay').style.display = 'none';
    editingGoalId = null;
  }

  async function handleSaveGoalEdit(event) {
    event.preventDefault();
    if (!editingGoalId) return;

    const icon = document.getElementById('goal-edit-icon').value.trim() || '🎯';
    const name = document.getElementById('goal-edit-name').value.trim();
    const target = parseFloat(document.getElementById('goal-edit-target').value);
    const targetDate = document.getElementById('goal-edit-date').value || null;

    if (!name) { setStatus('goal-edit-status', t('goals.error_name_required'), 'error'); return; }
    if (isNaN(target) || target <= 0) { setStatus('goal-edit-status', t('goals.error_target_invalid'), 'error'); return; }

    const { error } = await supabaseClient
      .from('savings_goals')
      .update({ icon, name, target_amount: Math.round(target * 100) / 100, target_date: targetDate })
      .eq('id', editingGoalId);

    if (error) {
      setStatus('goal-edit-status', t('common.error_prefix') + error.message, 'error');
      return;
    }

    closeGoalEditModal();
    showToast(t('goals.toast_updated'), 'success');
    await loadGoals();
  }

  // ===== Изтриване =====
  async function deleteGoal(goalId) {
    const g = goals.find(x => x.id === goalId);
    if (!g) return;

    const ok = await showConfirm(t('goals.confirm_delete_message', { name: g.name }), t('goals.confirm_delete_title'));
    if (!ok) return;

    const { error } = await supabaseClient.from('savings_goals').delete().eq('id', goalId);
    if (error) {
      showToast(t('common.error_prefix') + error.message, 'error');
      return;
    }

    showToast(t('goals.toast_deleted'), 'success');
    await loadGoals();
  }

  // ===== Изход =====
  async function handleSignOut() {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }

  // ===== Смяна на език: презареждаме динамично рендерираните карти =====
  window.onLanguageChange = function () {
    if (goals.length || document.getElementById('goals-list')) renderGoals();
  };
</script>

</body>
