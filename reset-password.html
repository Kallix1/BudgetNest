<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нова парола — BudgetNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Смяна на тема" style="position: fixed; top: 24px; right: 24px; z-index: 5;">🌙</button>

<div class="page" style="grid-template-columns: 1fr; max-width: 460px;">
  <div class="form-side" style="padding: 56px 48px;">
    <div class="brand-mark" style="margin-bottom: 28px;">BudgetNest</div>

    <div id="reset-loading">
      <p style="color: var(--text-secondary); font-size: 14px;">Проверка на линка…</p>
    </div>

    <div id="reset-invalid" style="display:none;">
      <h2 style="font-family:'Fraunces',serif; font-size: 24px; color: var(--heading-accent); margin-bottom: 12px;">Линкът е невалиден или изтекъл</h2>
      <p style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 24px;">
        Линковете за възстановяване на парола важат ограничено време. Върнете се към входа и заявете нов линк.
      </p>
      <a href="login.html" class="submit" style="display:block; text-align:center; text-decoration:none;">Обратно към входа</a>
    </div>

    <form id="reset-form" style="display:none; flex-direction: column; gap: 24px;" onsubmit="handleResetPassword(event)">
      <div>
        <h2 style="font-family:'Fraunces',serif; font-size: 24px; color: var(--heading-accent); margin-bottom: 8px;">Задайте нова парола</h2>
        <p style="color: var(--text-secondary); font-size: 14px;">Изберете нова парола за акаунта си.</p>
      </div>

      <div class="field">
        <label for="new-password">Нова парола</label>
        <input type="password" id="new-password" placeholder="Поне 6 символа" minlength="6" required>
      </div>

      <div class="field">
        <label for="confirm-password">Потвърдете паролата</label>
        <input type="password" id="confirm-password" placeholder="Повторете паролата" minlength="6" required>
      </div>

      <div class="status-msg" id="reset-status"></div>
      <button type="submit" class="submit" id="reset-submit">Запази новата парола</button>
    </form>
  </div>
</div>

<script>
  // ===== Тъмна тема =====
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function setStatus(elId, message, type) {
    const el = document.getElementById(elId);
    el.textContent = message;
    el.className = 'status-msg' + (type ? ' ' + type : '');
  }

  function showState(state) {
    document.getElementById('reset-loading').style.display = state === 'loading' ? 'block' : 'none';
    document.getElementById('reset-invalid').style.display = state === 'invalid' ? 'block' : 'none';
    document.getElementById('reset-form').style.display = state === 'form' ? 'flex' : 'none';
  }

  // ===== Проверка на recovery линка =====
  // Supabase-js автоматично парсва access_token/type=recovery от URL хеша
  // при зареждане на страницата и издава PASSWORD_RECOVERY събитие.
  let recoveryReady = false;

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
      showState('form');
    }
  });

  (async function init() {
    // Ако събитието вече е минало преди да се закачим (бавна мрежа), проверяваме сесията директно
    const { data: { session } } = await supabaseClient.auth.getSession();

    setTimeout(() => {
      if (!recoveryReady) {
        if (session) {
          // Има валидна сесия от recovery линка, дори без изричното събитие
          showState('form');
        } else {
          showState('invalid');
        }
      }
    }, 1200);
  })();

  // ===== Задаване на нова парола =====
  async function handleResetPassword(event) {
    event.preventDefault();
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-submit');

    if (newPassword !== confirmPassword) {
      setStatus('reset-status', 'Паролите не съвпадат.', 'error');
      return;
    }

    btn.disabled = true;
    setStatus('reset-status', 'Запазване…', '');

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    btn.disabled = false;

    if (error) {
      setStatus('reset-status', 'Грешка: ' + error.message, 'error');
      return;
    }

    setStatus('reset-status', 'Паролата е сменена успешно! Пренасочване към входа…', 'success');
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);
  }
</script>

</body>
</html>
