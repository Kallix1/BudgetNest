<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нова парола — BudgetNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=16">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Смяна на тема" style="position: fixed; top: 24px; right: 24px; z-index: 5;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>

<div class="page" style="grid-template-columns: 1fr; max-width: 460px;">
  <div class="form-side" style="padding: 56px 48px;">
    <div class="brand-mark" style="margin-bottom: 28px;">BudgetNest</div>

    <div id="reset-loading">
      <p style="color: var(--text-secondary); font-size: 14px;">Проверка на линка…</p>
    </div>

    <div id="reset-invalid" style="display:none;">
      <h2 style="font-family:'Fraunces',serif; font-size: 24px; color: var(--heading-accent); margin-bottom: 12px;">Линкът е невалиден или изтекъл</h2>
      <p id="reset-invalid-reason" style="color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 24px;">
        Линковете за възстановяване на парола важат ограничено време. Върнете се към входа и заявете нов линк.
      </p>
      <a href="login.html" class="submit" style="display:block; text-align:center; text-decoration:none;">Обратно към входа</a>
    </div>

    <form id="reset-form" style="display:none; flex-direction: column; gap: 24px;" onsubmit="handleResetPassword(event)">
      <div>
        <h2 style="font-family:'Fraunces',serif; font-size: 24px; color: var(--heading-accent); margin-bottom: 8px;">Задайте нова парола</h2>
        <p style="color: var(--text-secondary); font-size: 14px;">Изберете нова парола за акаунта си.</p>
      </div>

      <div class="field">
        <label for="new-password">Нова парола</label>
        <input type="password" id="new-password" placeholder="Поне 6 символа" minlength="6" required>
      </div>

      <div class="field">
        <label for="confirm-password">Потвърдете паролата</label>
        <input type="password" id="confirm-password" placeholder="Повторете паролата" minlength="6" required>
      </div>

      <div class="status-msg" id="reset-status"></div>
      <button type="submit" class="submit" id="reset-submit">Запази новата парола</button>
    </form>
  </div>
</div>

<script>
  // ===== Тъмна тема =====
  const SUN_ICON_PATH = '<circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  const MOON_ICON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon">' + (theme === 'dark' ? SUN_ICON_PATH : MOON_ICON_PATH) + '</svg>';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function setStatus(elId, message, type) {
    const el = document.getElementById(elId);
    el.textContent = message;
    el.className = 'status-msg' + (type ? ' ' + type : '');
  }

  function showState(state) {
    document.getElementById('reset-loading').style.display = state === 'loading' ? 'block' : 'none';
    document.getElementById('reset-invalid').style.display = state === 'invalid' ? 'block' : 'none';
    document.getElementById('reset-form').style.display = state === 'form' ? 'flex' : 'none';
  }

  function showInvalid(reason) {
    if (reason) {
      const p = document.getElementById('reset-invalid-reason');
      if (p) p.textContent = 'Причина: ' + reason + '. Върнете се към входа и заявете нов линк.';
    }
    showState('invalid');
  }

  // Чете грешка, върната от Supabase в линка (напр. изтекъл линк: otp_expired)
  function getUrlError() {
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const query = new URLSearchParams(window.location.search);
    const raw = hash.get('error_description') || query.get('error_description')
             || hash.get('error') || query.get('error');
    return raw ? decodeURIComponent(raw.replace(/\+/g, ' ')) : null;
  }

  // ===== Проверка на recovery линка =====
  let recoveryReady = false;

  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
      recoveryReady = true;
      showState('form');
    }
  });

  (async function init() {
    // 1) Ако линкът носи грешка (изтекъл / вече използван) — показваме я директно
    const urlError = getUrlError();
    if (urlError) { showInvalid(urlError); return; }

    // 2) PKCE flow: линкът връща ?code=... — обменяме го за сесия
    const code = new URLSearchParams(window.location.search).get('code');
    if (code) {
      const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
      if (!error) { recoveryReady = true; showState('form'); return; }
      // Ако обменът се провали (напр. отворен на друго устройство при PKCE)
      showInvalid('линкът трябва да се отвори на същото устройство, от което е заявен');
      return;
    }

    // 3) Implicit flow / резервна проверка — кратък retry вместо твърд таймер
    for (let i = 0; i < 8 && !recoveryReady; i++) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) { showState('form'); return; }
      await new Promise(r => setTimeout(r, 300));
    }
    if (!recoveryReady) showInvalid();
  })();

  // ===== Задаване на нова парола =====
  async function handleResetPassword(event) {
    event.preventDefault();
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const btn = document.getElementById('reset-submit');

    if (newPassword !== confirmPassword) {
      setStatus('reset-status', 'Паролите не съвпадат.', 'error');
      return;
    }

    btn.disabled = true;
    setStatus('reset-status', 'Запазване…', '');

    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });

    btn.disabled = false;

    if (error) {
      setStatus('reset-status', 'Грешка: ' + error.message, 'error');
      return;
    }

    setStatus('reset-status', 'Паролата е сменена успешно! Пренасочване към входа…', 'success');
    setTimeout(() => { window.location.href = 'login.html'; }, 1800);
  }
</script>

<script src="chatbot.js?v=1" defer></script>
</body>
</html>
