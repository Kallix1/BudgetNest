<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B1%3C/text%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страницата не е намерена — BudgetNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  /* Прилагаме темата ПРЕДИ стиловете да се рендерират, за да няма
     "премигване". Същата логика като на index.html: първо запазеният
     избор на потребителя, иначе — настройката на системата. */
  (function () {
    var theme = null;
    try { theme = localStorage.getItem('budgetnest-theme'); } catch (e) {}
    if (!theme) {
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      theme = prefersDark ? 'dark' : 'light';
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<style>
  :root {
    --bg-void:#F4F6F8; --bg-panel:#FFFFFF; --border-soft:#E2E8F0;
    --nest-green-dark:#1A3326; --nest-green-mid:#254A37; --nest-green-light:#366A4F; --nest-gold:#2E9E44; --nest-gold-accent:#21813A;
    --text-primary:#1A202C; --text-secondary:#4A5568; --text-dim:#718096;
  }
  /* Тъмната тема следва запазения избор на потребителя (budgetnest-theme),
     точно както на всички останали страници — вижте скрипта в <head>. */
  [data-theme="dark"] {
    --bg-void:#0A0F14; --bg-panel:#10161C; --border-soft:rgba(255,255,255,0.08);
    --nest-green-dark:#0A0F14; --nest-green-mid:#4FAE72; --nest-green-light:#3E7A50; --nest-gold:#43A248; --nest-gold-accent:#368A3C;
    --text-primary:#F1F5F1; --text-secondary:#A9BDAF; --text-dim:#6E8577;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Inter',sans-serif; background:var(--bg-void); color:var(--text-primary);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; line-height:1.6;
  }
  .mark {
    width:64px; height:64px; border-radius:16px; font-size:34px;
    display:flex; align-items:center; justify-content:center; margin-bottom:24px;
    background:linear-gradient(135deg,var(--nest-green-mid),var(--nest-green-light));
  }
  .code { font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(56px,12vw,90px); line-height:1; margin-bottom:8px;
    background:linear-gradient(120deg,var(--nest-green-light),var(--nest-gold));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  h1 { font-family:'Playfair Display',serif; font-weight:600; font-size:24px; margin-bottom:10px; }
  p { color:var(--text-secondary); max-width:420px; margin:0 auto 28px; }
  .actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .btn {
    display:inline-flex; align-items:center; justify-content:center; font-weight:600; font-size:14px;
    padding:12px 24px; border-radius:12px; cursor:pointer; text-decoration:none;
    border:1px solid transparent; transition:transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  .btn-primary { background:linear-gradient(135deg,var(--nest-gold),var(--nest-gold-accent)); color:var(--nest-green-dark); box-shadow:0 4px 14px rgba(67,162,72,0.28); }
  .btn-primary:hover { transform:translateY(-2px); }
  .btn-ghost { background:transparent; color:var(--text-primary); border-color:var(--border-soft); }
  .btn-ghost:hover { background:var(--bg-panel); }
</style>
</head>
<body>
  <div class="mark"><svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"></path><path d="M5.5 9.8V19a1.3 1.3 0 0 0 1.3 1.3h10.4A1.3 1.3 0 0 0 18.5 19V9.8"></path><path d="M9.2 19v-4.2c0-1.1.6-1.9 1.6-2.3.9-.3 1.6-1.1 1.6-2.1 0-1.2-1-2.1-2.1-1.9-.8.1-1.4.7-1.6 1.4"></path></svg></div>
  <div class="code">404</div>
  <h1 id="t-title">Тази страница я няма</h1>
  <p id="t-text">Изглежда сте попаднали на несъществуващ адрес. Да ви върнем при бюджета?</p>
  <div class="actions">
    <a href="dashboard.html" class="btn btn-primary" id="t-dash">Към таблото</a>
    <a href="index.html" class="btn btn-ghost" id="t-home">Начална страница</a>
  </div>
  <script>
    (function () {
      var lang = 'bg';
      try { lang = localStorage.getItem('budgetnest-lang') || 'bg'; } catch (e) {}
      if (lang !== 'en') return;
      document.documentElement.lang = 'en';
      document.title = 'Page not found — BudgetNest';
      document.getElementById('t-title').textContent = 'This page doesn’t exist';
      document.getElementById('t-text').textContent = 'Looks like you landed on an address that isn’t here. Shall we take you back to your budget?';
      document.getElementById('t-dash').textContent = 'Go to dashboard';
      document.getElementById('t-home').textContent = 'Home page';
    })();
  </script>
<script src="chatbot.js?v=1" defer></script>
</body>
</html>
