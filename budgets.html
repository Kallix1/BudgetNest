<script>
  function showToast(message, type) {
    const container = document.getElementById('app-toast-container');
    const toast = document.createElement('div');
    const palette = {
      error:   { bg: '#7F1D1D', border: '#EF4444' },
      success: { bg: '#14532D', border: '#22C55E' },
      info:    { bg: '#1E3A5F', border: '#3B82F6' },
    };
    const c = palette[type] || palette.info;
    toast.style.cssText = `background:${c.bg}; border:1px solid ${c.border}; color:#fff; padding:14px 18px; border-radius:10px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,0.35); max-width:340px; line-height:1.45;`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = 'opacity 0.3s ease';
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 300);
    }, 4200);
  }
</script>

<script>
  // ===== Тъмна тема =====
  const SUN_ICON_PATH = '<circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  const MOON_ICON_PATH = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = document.getElementById('theme-toggle-btn');
    if (btn) btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-toggle-icon">' + (theme === 'dark' ? SUN_ICON_PATH : MOON_ICON_PATH) + '</svg>';
    localStorage.setItem('budgetnest-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(localStorage.getItem('budgetnest-theme') || 'light');

  // ===== Supabase конфигурация =====
  const SUPABASE_URL = 'https://fvorpmajvrsxrwtscmwk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_KmFRXFvW-wCf5LJXMgHejQ__3CH2PB7';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Показва връзката "Споделено" в менюто само ако домакинството има повече от 1 член
  async function updateSettleNavVisibility(userId) {
    const link = document.getElementById('settle-nav-link');
    if (!link) return;
    const { data: myMembership } = await supabaseClient
      .from('household_members')
      .select('household_id')
      .eq('user_id', userId)
      .limit(1)
      .maybeSingle();
    if (!myMembership) { link.style.display = 'none'; return; }
    const { count } = await supabaseClient
      .from('household_members')
      .select('*', { count: 'exact', head: true })
      .eq('household_id', myMembership.household_id);
    link.style.display = (count && count > 1) ? 'flex' : 'none';
  }
  const ADMIN_EMAILS = ['choko2009vr@gmail.com']; // <-- замени с истинския си имейл

  let currentUser = null;
  let currentHouseholdId = null;
  let expenseCategories = [];
  let budgetsByCategory = {}; // category_id -> { id, monthly_limit, rollover_enabled }
  let spentByCategory = {};   // category_id -> сума похарчено този месец
  let rolloverInByCategory = {}; // category_id -> пренесена сума за ТЕКУЩИЯ месец
  const ROLLOVER_LOOKBACK_MONTHS = 12;

  const tr = (key, vars) => window.BudgetNestI18n ? window.BudgetNestI18n.t(key, vars) : key;
  const getLang = () => window.BudgetNestI18n ? window.BudgetNestI18n.getLang() : 'bg';
  const eur = (n) => (Number(n) || 0).toLocaleString(getLang() === 'bg' ? 'bg-BG' : 'en-IE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';

  // ===== Escaping на потребителски текст преди вмъкване в innerHTML =====
  // ВАЖНО: никога не викаме .toISOString() върху дата, конструирана по
  // МЕСТНО време (new Date(y, m, d)) — тя винаги минава през UTC и може да
  // размести деня (а понякога и месеца) според часовата зона на браузъра.
  // Форматираме годината/месеца/деня директно, без UTC конверсия.
  function pad2(n) { return String(n).padStart(2, '0'); }
  function toLocalISODate(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ===== Init flow =====
  (async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    updateSettleNavVisibility(currentUser.id);

    if (ADMIN_EMAILS.map(e => e.toLowerCase()).includes((currentUser.email || '').toLowerCase())) {
      document.getElementById('admin-nav-link').style.display = 'flex';
    }

    const { data: memberships, error } = await supabaseClient
      .from('household_members')
      .select('household_id, households(name)')
      .eq('user_id', currentUser.id)
      .limit(1);

    if (error) { console.error(error); return; }

    if (!memberships || memberships.length === 0) {
      window.location.href = 'dashboard.html';
      return;
    }

    currentHouseholdId = memberships[0].household_id;
    document.getElementById('household-name').textContent = memberships[0].households.name;
    document.getElementById('page-main').style.display = 'block';

    const monthKeys = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const monthNames = monthKeys.map(k => tr('dashboard.month_' + k));
    const now = new Date();
    document.getElementById('budgets-month-label').textContent = monthNames[now.getMonth()] + ' ' + now.getFullYear();

    await loadData();
    renderBudgets();
  })();

  // ===== Зареждане на категории, бюджети и текущи разходи =====
  // За "Пренасяне на бюджет" освен текущия месец се тегли и историята на
  // разходите за последните (най-много) 12 месеца назад, за да се изчисли
  // веригата от пренесени суми месец по месец. Опростяване: приемаме, че
  // месечният лимит е бил същият през целия този прозорец (иначе би трябвало
  // да пазим лимита исторически по месеци, което е излишно за домашен бюджет).
  async function loadData() {
    const { data: cats, error: catError } = await supabaseClient
      .from('categories')
      .select('*')
      .eq('household_id', currentHouseholdId)
      .eq('type', 'expense')
      .order('name');

    if (catError) { console.error(catError); return; }
    expenseCategories = cats || [];

    const { data: budgets, error: budgetError } = await supabaseClient
      .from('budgets')
      .select('*')
      .eq('household_id', currentHouseholdId);

    if (budgetError) { console.error(budgetError); return; }
    budgetsByCategory = {};
    (budgets || []).forEach(b => { budgetsByCategory[b.category_id] = b; });

    const now = new Date();
    const monthStart = toLocalISODate(new Date(now.getFullYear(), now.getMonth(), 1));
    const monthEnd = toLocalISODate(new Date(now.getFullYear(), now.getMonth() + 1, 0));

    const { data: txs, error: txError } = await supabaseClient
      .from('transactions')
      .select('category_id, amount')
      .eq('household_id', currentHouseholdId)
      .gte('transaction_date', monthStart)
      .lte('transaction_date', monthEnd);

    if (txError) { console.error(txError); return; }
    spentByCategory = {};
    (txs || []).forEach(t => {
      spentByCategory[t.category_id] = (spentByCategory[t.category_id] || 0) + Number(t.amount);
    });

    await loadRolloverHistory(now);
  }

  async function loadRolloverHistory(now) {
    rolloverInByCategory = {};

    const rolloverCategoryIds = expenseCategories
      .filter(c => budgetsByCategory[c.id]?.rollover_enabled)
      .map(c => c.id);

    if (!rolloverCategoryIds.length) return;

    const historyStart = new Date(now.getFullYear(), now.getMonth() - ROLLOVER_LOOKBACK_MONTHS, 1);
    const currentMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);

    // ВАЖНО: месеците, преди да е имало КАКВАТО И ДА Е транзакция в домакинството
    // (напр. преди да съществува акаунтът), НЕ трябва да се броят като "похарчени
    // 0 € и следователно пренесени изцяло" — иначе за ново домакинство или
    // новосъздадена категория веригата компаундира лимита неограничено назад
    // и пренася нереалистично голяма сума ("безплатни" месеци отпреди акаунта).
    // Затова първо намираме реалното начало на историята на домакинството.
    const { data: earliestTxRows, error: earliestError } = await supabaseClient
      .from('transactions')
      .select('transaction_date')
      .eq('household_id', currentHouseholdId)
      .order('transaction_date', { ascending: true })
      .limit(1);

    if (earliestError) { console.error(earliestError); return; }

    const earliestDate = earliestTxRows && earliestTxRows.length
      ? new Date(earliestTxRows[0].transaction_date)
      : currentMonthStart; // няма никакви транзакции все още -> няма история за пренасяне
    const earliestMonthStart = new Date(earliestDate.getFullYear(), earliestDate.getMonth(), 1);

    const { data: histTxs, error } = await supabaseClient
      .from('transactions')
      .select('category_id, amount, transaction_date')
      .eq('household_id', currentHouseholdId)
      .in('category_id', rolloverCategoryIds)
      .gte('transaction_date', toLocalISODate(historyStart))
      .lt('transaction_date', toLocalISODate(currentMonthStart));

    if (error) { console.error(error); return; }

    // spentByMonth['YYYY-M']['category_id'] = сума
    const spentByMonth = {};
    (histTxs || []).forEach(t => {
      const d = new Date(t.transaction_date);
      const key = d.getFullYear() + '-' + d.getMonth();
      if (!spentByMonth[key]) spentByMonth[key] = {};
      spentByMonth[key][t.category_id] = (spentByMonth[key][t.category_id] || 0) + Number(t.amount);
    });

    rolloverCategoryIds.forEach(categoryId => {
      const monthlyLimit = Number(budgetsByCategory[categoryId]?.monthly_limit) || 0;
      let rolloverIn = 0; // преди реалната история на домакинството няма какво да се пренася

      for (let i = ROLLOVER_LOOKBACK_MONTHS; i >= 1; i--) {
        const monthDate = new Date(now.getFullYear(), now.getMonth() - i, 1);
        if (monthDate < earliestMonthStart) continue; // все още няма история за този месец — пропускаме го

        const key = monthDate.getFullYear() + '-' + monthDate.getMonth();
        const spentThatMonth = spentByMonth[key]?.[categoryId] || 0;
        const effectiveLimitThatMonth = monthlyLimit + rolloverIn;
        rolloverIn = Math.max(0, Math.round((effectiveLimitThatMonth - spentThatMonth) * 100) / 100);
      }

      rolloverInByCategory[categoryId] = rolloverIn;
    });
  }

  // ===== Рендиране на списъка =====
  // Базов лимит + пренесена сума (ако е активирано пренасянето за категорията)
  function getEffectiveLimit(cat) {
    const budget = budgetsByCategory[cat.id];
    const base = budget ? Number(budget.monthly_limit) : 0;
    const rolloverEnabled = !!budget?.rollover_enabled;
    const rolloverIn = rolloverEnabled ? (rolloverInByCategory[cat.id] || 0) : 0;
    return {
      budget,
      base,
      rolloverEnabled,
      rolloverIn,
      effective: base + rolloverIn,
      hasLimit: !!budget && base > 0,
    };
  }

  function renderBudgets() {
    const container = document.getElementById('budgets-list');

    if (!expenseCategories.length) {
      container.innerHTML = '<div class="empty-state">' + escapeHtml(tr('budgets.empty_no_categories')) + '</div>';
      return;
    }

    container.innerHTML = expenseCategories.map(cat => {
      const { budget, base, rolloverEnabled, rolloverIn, effective, hasLimit } = getEffectiveLimit(cat);
      const limit = effective; // от тук надолу цялата логика гледа ЕФЕКТИВНИЯ лимит (база + пренесено)
      const spent = spentByCategory[cat.id] || 0;
      const rawPct = hasLimit ? (spent / limit) * 100 : 0;
      const pct = hasLimit ? Math.min(rawPct, 100) : 0;
      const isOver = hasLimit && spent > limit;
      const isNear = hasLimit && !isOver && rawPct >= 80; // предупреждение при 80%+

      let badge = '';
      if (isOver) {
        badge = `<span class="budget-badge over">⚠ ${Math.round(rawPct)}%</span>`;
      } else if (isNear) {
        badge = `<span class="budget-badge near">${Math.round(rawPct)}%</span>`;
      } else if (hasLimit) {
        badge = `<span class="budget-badge ok">${Math.round(rawPct)}%</span>`;
      }

      const rolloverHint = (rolloverEnabled && hasLimit && Math.abs(rolloverIn) >= 0.01)
        ? `<div class="hint" style="margin-top:4px;">${escapeHtml(tr('budgets.rollover_hint', { base: eur(base), rolloverIn: eur(rolloverIn), effective: eur(effective) }))}</div>`
        : '';

      const statsHtml = hasLimit
        ? `<div class="budget-stats">
             <span>${tr('budgets.spent_label')}: <b>${eur(spent)}</b></span>
             <span class="${isOver ? 'over-label' : ''}">${isOver ? tr('budgets.limit_over_label') : tr('budgets.limit_label')}: <b>${eur(limit)}</b></span>
           </div>`
        : `<div class="budget-stats">
             <span>${tr('budgets.spent_this_month_label')}: <b>${eur(spent)}</b></span>
             <span class="budget-no-limit">${tr('budgets.no_limit_label')}</span>
           </div>`;

      const fillClass = isOver ? 'over' : (isNear ? 'near' : '');
      const trackHtml = hasLimit
        ? `<div class="compare-track"><div class="compare-fill ${fillClass}" style="width:${pct}%"></div></div>`
        : '';

      const warnHtml = isOver
        ? `<div class="budget-warn over">${escapeHtml(tr('budgets.warn_over', { amount: eur(spent - limit) }))}</div>`
        : (isNear ? `<div class="budget-warn near">${escapeHtml(tr('budgets.warn_near', { amount: eur(limit - spent) }))}</div>` : '');

      return `
        <div class="budget-row" data-category="${cat.id}">
          <div class="budget-head">
            <div class="budget-cat">
              <span class="budget-cat-icon">${escapeHtml(cat.icon) || '💰'}</span>
              ${escapeHtml(cat.name)}
              ${badge}
            </div>
            <div class="budget-controls">
              <input type="number" class="budget-input" id="budget-input-${cat.id}" min="0" step="0.01"
                     placeholder="${escapeHtml(tr('budgets.limit_placeholder'))}" value="${budget ? base : ''}">
              <button type="button" class="budget-save-btn" onclick="saveBudget('${cat.id}')">${tr('budgets.save_btn')}</button>
              ${budget ? `<button type="button" class="budget-clear-btn" onclick="clearBudget('${cat.id}')">${tr('budgets.clear_btn')}</button>` : ''}
            </div>
          </div>
          <label style="display:flex; align-items:center; gap:6px; margin-top:6px; font-size:12.5px; color:var(--text-secondary); cursor:pointer;">
            <input type="checkbox" id="budget-rollover-${cat.id}" style="width:auto;" ${rolloverEnabled ? 'checked' : ''}
              onchange="saveBudgetRollover('${cat.id}', this.checked)">
            ${escapeHtml(tr('budgets.rollover_checkbox_label'))}
          </label>
          ${trackHtml}
          ${statsHtml}
          ${rolloverHint}
          ${warnHtml}
        </div>`;
    }).join('');

    // Обобщение най-отгоре
    renderBudgetSummary();
  }

  function renderBudgetSummary() {
    const labelEl = document.getElementById('budgets-summary');
    if (!labelEl) return;
    let over = 0, near = 0;
    expenseCategories.forEach(cat => {
      const { hasLimit, effective } = getEffectiveLimit(cat);
      if (!hasLimit) return;
      const spent = spentByCategory[cat.id] || 0;
      const pct = (spent / effective) * 100;
      if (spent > effective) over++;
      else if (pct >= 80) near++;
    });
    if (over === 0 && near === 0) {
      labelEl.innerHTML = '<span class="budget-summary-pill ok">' + escapeHtml(tr('budgets.summary_all_ok')) + '</span>';
    } else {
      const parts = [];
      if (over) parts.push(`<span class="budget-summary-pill over">⚠ ${escapeHtml(tr(over === 1 ? 'budgets.summary_over_one' : 'budgets.summary_over_many', { n: over }))}</span>`);
      if (near) parts.push(`<span class="budget-summary-pill near">${escapeHtml(tr('budgets.summary_near', { n: near }))}</span>`);
      labelEl.innerHTML = parts.join(' ');
    }
  }

  // ===== Запазване на лимит (upsert) =====
  async function saveBudget(categoryId) {
    const input = document.getElementById('budget-input-' + categoryId);
    const value = parseFloat(input.value);

    if (isNaN(value) || value <= 0) {
      showToast(tr('budgets.err_invalid_limit'), 'error');
      return;
    }

    // Пазим текущото състояние на "пренасяне", за да не се нулира при запис на лимита
    const rolloverCheckbox = document.getElementById('budget-rollover-' + categoryId);
    const rolloverEnabled = rolloverCheckbox ? rolloverCheckbox.checked : !!budgetsByCategory[categoryId]?.rollover_enabled;

    const { error } = await supabaseClient
      .from('budgets')
      .upsert(
        { household_id: currentHouseholdId, category_id: categoryId, monthly_limit: value, rollover_enabled: rolloverEnabled },
        { onConflict: 'household_id,category_id' }
      );

    if (error) {
      showToast(tr('common.error_prefix') + error.message, 'error');
      return;
    }

    await loadData();
    renderBudgets();
  }

  // ===== Включване/изключване на пренасянето на бюджет =====
  async function saveBudgetRollover(categoryId, enabled) {
    const existing = budgetsByCategory[categoryId];
    if (!existing) {
      showToast(tr('budgets.err_save_limit_first'), 'error');
      const checkbox = document.getElementById('budget-rollover-' + categoryId);
      if (checkbox) checkbox.checked = false;
      return;
    }

    const { error } = await supabaseClient
      .from('budgets')
      .update({ rollover_enabled: enabled })
      .eq('household_id', currentHouseholdId)
      .eq('category_id', categoryId);

    if (error) {
      showToast(tr('common.error_prefix') + error.message, 'error');
      return;
    }

    showToast(enabled ? tr('budgets.rollover_on_toast') : tr('budgets.rollover_off_toast'), 'success');
    await loadData();
    renderBudgets();
  }

  // ===== Изчистване на лимит =====
  async function clearBudget(categoryId) {
    const { error } = await supabaseClient
      .from('budgets')
      .delete()
      .eq('household_id', currentHouseholdId)
      .eq('category_id', categoryId);

    if (error) {
      showToast(tr('common.error_prefix') + error.message, 'error');
      return;
    }

    await loadData();
    renderBudgets();
  }

  // ===== Изход =====
  async function handleSignOut() {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  }

  // ===== Смяна на език: презареждаме динамично рендерираните части =====
  window.onLanguageChange = function () {
    if (!currentHouseholdId) return;
    const now = new Date();
    const monthKeys = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    const monthNames = monthKeys.map(k => tr('dashboard.month_' + k));
    document.getElementById('budgets-month-label').textContent = monthNames[now.getMonth()] + ' ' + now.getFullYear();
    renderBudgets();
  };
</script>
